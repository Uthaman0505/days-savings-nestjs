# Branch model: `development` = integration/dev, `master` = production.
name: CI

on:
  pull_request:
    branches:
      - master
      - development
  push:
    branches:
      - master
      - development

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --frozen-lockfile
      - run: yarn lint:ci
      - run: yarn test
      - run: yarn build
